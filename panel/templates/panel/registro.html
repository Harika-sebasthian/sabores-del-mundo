{% extends 'panel/base_panel.html' %}
{% block title %}Registro{% endblock %}

{% block content %}
<div class="auth-card">
    <h2 class="auth-card__title">Crear Cuenta</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-input" placeholder="Tu nombre" required>
        </div>
        <div class="form-group">
            <label class="form-label">Apellido</label>
            <input type="text" name="apellido" class="form-input" placeholder="Tu apellido" required>
        </div>
        <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-input" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--accent">Registrarse</button>
    </form>
    <a href="{% url 'login_panel' %}" class="auth-card__link">¿Ya tenés cuenta? Iniciá sesión</a>
</div>
{% endblock %}

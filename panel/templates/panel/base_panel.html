{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel{% endblock %} | Sabores del Mundo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'panel/css/panel.css' %}">
</head>
<body>
    {% if request.user.is_authenticated %}
    <header class="panel-header">
        <h1 class="panel-header__title">Panel — Sabores del Mundo</h1>
        <a href="{% url 'logout_panel' %}" class="panel-header__logout">Cerrar sesión</a>
    </header>
    {% endif %}

    <div class="panel-content">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message message--{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>

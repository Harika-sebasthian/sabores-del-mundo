{% extends 'panel/base_panel.html' %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="auth-card">
    <h2 class="auth-card__title">Iniciar Sesión</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-input" placeholder="tu@email.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn--accent">Ingresar</button>
    </form>
    <a href="{% url 'registro' %}" class="auth-card__link">¿No tenés cuenta? Registrate</a>
</div>
{% endblock %}
